name: Deploy AWS Lambda

on:
  push:
    branches: [ "main" ]
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function_dir: [pdfOcr, pdfSplit]
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read  # Required to check out the repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in this function
        id: check_changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep "^functions/${{ matrix.function_dir }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Zip & Deploy
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          FUNCTION_NAME="${{ matrix.function_dir }}"
          cd functions/${{ matrix.function_dir }}   
          mkdir -p package
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt -t ./package
          fi
          cp lambda_function.py ./package/
          
          cd package && zip -r ../function.zip .
          cd ..
          
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://function.zip
